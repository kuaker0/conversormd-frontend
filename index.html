<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ConversorMD</title>

  <style>
    body {
      background: #0f1117;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 600px;
      text-align: center;
    }

    .drop-zone {
      border: 2px dashed #6c63ff;
      padding: 50px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      background: rgba(255,255,255,0.03);
    }

    .drop-zone:hover {
      background: rgba(255,255,255,0.05);
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #6c63ff;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .progress {
      margin-top: 20px;
      width: 100%;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      width: 0%;
      height: 20px;
      background: #6c63ff;
      transition: width 0.2s;
    }

    .status {
      margin-top: 15px;
      color: #ccc;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>ConversorMD</h1>

  <div class="drop-zone" id="drop-zone">
    Arrastra archivos aquí o haz click
  </div>

  <input type="file" id="file-input" multiple hidden />

  <button onclick="uploadFiles()">Convertir a Markdown</button>

  <div class="progress">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="status" id="status"></div>

</div>

<script>

const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");

dropZone.addEventListener("click", () => {
  fileInput.click();
});

dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
});

dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  fileInput.files = e.dataTransfer.files;
});

async function uploadFiles() {

  const files = fileInput.files;

  if (!files.length) {
    alert("Selecciona al menos un archivo");
    return;
  }

  for (const file of files) {

    const formData = new FormData();
    formData.append("file", file);

    document.querySelector(".progress").style.display = "block";

    const response = await fetch(
      "https://conversormd-backend-production.up.railway.app/api/convert",
      {
        method: "POST",
        body: formData
      }
    );

    if (!response.ok) {
      document.getElementById("status").innerText =
        `Error convirtiendo ${file.name}`;
      continue;
    }

    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = file.name + ".md";
    a.click();

    document.getElementById("status").innerText =
      `${file.name} convertido correctamente`;

    document.getElementById("progress-bar").style.width = "100%";
  }
}

</script>

</body>
</html>
